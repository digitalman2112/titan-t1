<header class="site-header">
  <div class="container">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <nav class="site-nav" id="site-nav">
        <a href="{{ '/exercises/' | relative_url }}"{% if page.url contains '/exercises' %} class="active"{% endif %}>Exercises</a>
        <a href="{{ '/accessories/' | relative_url }}"{% if page.url contains '/accessories' %} class="active"{% endif %}>Accessories</a>
        <a href="{{ '/cables/' | relative_url }}"{% if page.url contains '/cables' %} class="active"{% endif %}>Cables</a>
        <a href="{{ '/machine/' | relative_url }}"{% if page.url contains '/machine' %} class="active"{% endif %}>Machine</a>
        <a href="{{ '/inspiration/' | relative_url }}"{% if page.url contains '/inspiration' %} class="active"{% endif %}>Inspiration</a>
      </nav>
      <div class="site-header__actions">
        <button class="calc-open-btn" id="calc-open-btn" aria-label="Open weight calculator" title="Weight Calculator">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="10" y2="18"/><line x1="14" y1="18" x2="16" y2="18"/></svg>
        </button>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
          <span class="theme-toggle__icon"></span>
        </button>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </div>
</header>
